name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            builder-flag: --win
            artifact-name: zarya-windows
            artifact-glob: |
              release/*.exe
          - os: macos-latest
            builder-flag: --mac
            artifact-name: zarya-macos
            artifact-glob: |
              release/*.dmg
          - os: ubuntu-latest
            builder-flag: --linux
            artifact-name: zarya-linux
            artifact-glob: |
              release/*.AppImage
              release/*.deb
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Package with electron-builder
        run: npx electron-builder --publish never ${{ matrix.builder-flag }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-glob }}
          if-no-files-found: error
