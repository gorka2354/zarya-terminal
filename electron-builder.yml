appId: dev.zarya.terminal
productName: Zarya
directories:
  output: release
  buildResources: build
files:
  - out/**
asarUnpack:
  - 'node_modules/@lydell/node-pty/**'
  - '**/*.node'
  # Native Claude Code driver: the SDK spawns its bundled CLI as a subprocess,
  # which can't execute from inside the asar archive.
  - 'node_modules/@anthropic-ai/claude-agent-sdk/**'
  - 'node_modules/@anthropic-ai/claude-agent-sdk-win32-x64/**'
extraResources:
  - from: resources
    to: app-resources
win:
  target:
    - nsis
    - portable
  artifactName: ${productName}-${version}-win-${arch}.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
mac:
  target:
    - dmg
  category: public.app-category.developer-tools
linux:
  target:
    - AppImage
    - deb
  category: Development
publish: null
