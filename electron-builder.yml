appId: dev.zarya.terminal
productName: Zarya
directories:
  output: release
  buildResources: build
files:
  - out/**
asarUnpack:
  - 'node_modules/@lydell/node-pty/**'
  - '**/*.node'
  # Native Claude Code driver: the SDK spawns its bundled CLI as a subprocess,
  # which can't execute from inside the asar archive. Glob covers whichever
  # platform binary is installed (win32-x64 / darwin-arm64 / darwin-x64 / linux-*).
  - 'node_modules/@anthropic-ai/claude-agent-sdk/**'
  - 'node_modules/@anthropic-ai/claude-agent-sdk-*/**'
extraResources:
  - from: resources
    to: app-resources
win:
  target:
    - nsis
    - portable
# Distinct names per target — nsis and portable share the default ${ext}=exe, so
# a single artifactName would make one silently overwrite the other.
nsis:
  artifactName: ${productName}-Setup-${version}-win-${arch}.${ext}
  oneClick: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
portable:
  artifactName: ${productName}-Portable-${version}-win-${arch}.${ext}
mac:
  target:
    - dmg
  category: public.app-category.developer-tools
linux:
  target:
    - AppImage
    - deb
  category: Development
publish: null
